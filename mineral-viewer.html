  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Search bar */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 600px;
    }

    .search-wrapper label {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #mineral-search {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    #mineral-search::placeholder {
      color: #555;
    }

    #mineral-search:focus {
      border-color: #555;
    }

    /* Main layout */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left: 3D canvas area */
    #canvas-container {
      width: 60%;
      border-right: 1px solid #1e1e1e;
      background-color: #0d0d0d;
      position: relative;
      overflow: hidden;
    }

    #canvas-container canvas {
      display: block;
    }

    /* Right panel */
    .side-panel {
      width: 40%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      gap: 1px;
      background-color: #111;
    }

    .panel-section {
      background-color: #0d0d0d;
      padding: 20px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-section + .panel-section {
      border-top: 1px solid #1e1e1e;
    }

    .panel-section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      font-weight: 500;
    }

    .panel-placeholder {
      flex: 1;
      background: #141414;
      border: 1px dashed #222;
      border-radius: 6px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2e2e2e;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    #mineral-photo {
      flex: 1;
      min-height: 160px;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
    }

    #mineral-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #structure-info {
      flex: 1;
      min-height: 100px;
      font-size: 13px;
      line-height: 1.65;
      color: #aaa;
    }

    #fun-facts {
      flex: 1;
      min-height: 100px;
    }

    #fun-facts ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #fun-facts li {
      position: relative;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.55;
      color: #aaa;
    }

    #fun-facts li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: #555;
      font-size: 15px;
      line-height: 1.4;
    }

    .panel-error {
      font-size: 13px;
      font-style: italic;
      color: #cc6644;
    }
    #mintoindbut {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="search-wrapper">
      <label for="mineral-search">Mineral</label>
      <input
        id="mineral-search"
        type="search"
        placeholder="Search minerals, e.g. Quartz, Pyrite…"
        autocomplete="off"
        spellcheck="false"
      />
      <a href="index.html"><button id="mintoindbut">Element viewer</button></a>
    </div>
  </header>

  <main>

    <div id="canvas-container"></div>

    <aside class="side-panel">

      <div class="panel-section">
        <h2>Photo</h2>
        <div id="mineral-photo"></div>
      </div>

      <div class="panel-section">
        <h2>Structure Info</h2>
        <div id="structure-info"></div>
      </div>

      <div class="panel-section">
        <h2>Fun Facts</h2>
        <div id="fun-facts"></div>
      </div>

    </aside>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    (function () {
      const container = document.getElementById('canvas-container');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d0d0d);

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        1000
      );
      camera.position.set(0, 0, 7);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
      dirLight.position.set(5, 8, 5);
      scene.add(dirLight);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 2;
      controls.maxDistance = 30;

      const resizeObserver = new ResizeObserver(([entry]) => {
        const { inlineSize: w, blockSize: h } = entry.contentBoxSize[0];
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
      resizeObserver.observe(container);

      const structureGroup = new THREE.Group();
      scene.add(structureGroup);

      const _up = new THREE.Vector3(0, 1, 0);

      function renderStructure(name) {
        const mineral = MINERALS[name];
        if (!mineral) return;

        // Remove and dispose every mesh from the previous structure
        for (let i = structureGroup.children.length - 1; i >= 0; i--) {
          const c = structureGroup.children[i];
          c.geometry.dispose();
          c.material.dispose();
          structureGroup.remove(c);
        }

        // Atom spheres
        mineral.atoms.forEach(({ x, y, z, color }) => {
          const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.28, 32, 16),
            new THREE.MeshStandardMaterial({ color, roughness: 0.45, metalness: 0.1 })
          );
          mesh.position.set(x, y, z);
          structureGroup.add(mesh);
        });

        // Bond cylinders
        mineral.bonds.forEach(([i, j]) => {
          const a = mineral.atoms[i];
          const b = mineral.atoms[j];
          const start = new THREE.Vector3(a.x, a.y, a.z);
          const end   = new THREE.Vector3(b.x, b.y, b.z);
          const dir   = new THREE.Vector3().subVectors(end, start);
          const len   = dir.length();

          const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.07, 0.07, len, 8, 1),
            new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.6 })
          );
          mesh.position.copy(start.clone().lerp(end, 0.5));
          mesh.quaternion.setFromUnitVectors(_up, dir.normalize());
          structureGroup.add(mesh);
        });
      }

      function updatePanel(name) {
        const mineral = MINERALS[name];
        if (!mineral) return;

        const photoEl = document.getElementById('mineral-photo');
        const img = document.createElement('img');
        img.src = mineral.image;
        img.alt = mineral.name;
        photoEl.replaceChildren(img);

        document.getElementById('structure-info').textContent = mineral.structureInfo;

        const ul = document.createElement('ul');
        mineral.facts.forEach(fact => {
          const li = document.createElement('li');
          li.textContent = fact;
          ul.appendChild(li);
        });
        document.getElementById('fun-facts').replaceChildren(ul);
      }

      function clearScene() {
        for (let i = structureGroup.children.length - 1; i >= 0; i--) {
          const c = structureGroup.children[i];
          c.geometry.dispose();
          c.material.dispose();
          structureGroup.remove(c);
        }
      }

      document.getElementById('mineral-search').addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;

        const key = this.value.trim().toLowerCase();

        if (MINERALS[key]) {
          renderStructure(key);
          updatePanel(key);
        } else {
          clearScene();
          document.getElementById('mineral-photo').replaceChildren();
          document.getElementById('fun-facts').replaceChildren();
          const msg = document.createElement('p');
          msg.className = 'panel-error';
          msg.textContent = key
            ? `No mineral named \u201c${key}\u201d \u2014 try quartz, pyrite, or diamond.`
            : 'Type a mineral name and press Enter.';
          document.getElementById('structure-info').replaceChildren(msg);
        }
      });

      renderStructure('quartz');
      updatePanel('quartz');

      (function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      })();
    })();
  </script>
