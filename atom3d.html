<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atom 3D Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060613;color:#dde;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 20px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:1.3rem;font-weight:600;white-space:nowrap}
.controls{display:flex;gap:8px;flex:1}
input{flex:1;max-width:380px;padding:8px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:.95rem;outline:none;transition:border-color .2s}
input:focus{border-color:#5588ff}
input::placeholder{color:rgba(255,255,255,.35)}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:500;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn-gen{background:#4466ff;color:#fff}
.btn-dl{background:#22aa66;color:#fff;display:none}
#wrap{flex:1;position:relative}
canvas{display:block}
#info{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.12);font-size:.82rem;line-height:1.9;min-width:180px;display:none}
#info h2{font-size:1.15rem;margin-bottom:4px}
#btn-dl-panel{display:none;width:100%;margin-top:12px;padding:9px;background:#22aa66;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;letter-spacing:.3px;transition:opacity .15s}
#btn-dl-panel:hover{opacity:.85}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.72rem;margin-bottom:8px}
#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:7px 18px;border-radius:20px;font-size:.78rem;color:rgba(255,255,255,.5);pointer-events:none;white-space:nowrap}
#err{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,50,50,.12);border:1px solid rgba(255,80,80,.4);padding:16px 28px;border-radius:10px;color:#ffaaaa;display:none;text-align:center}
</style>
</head>
<body>
<header>
  <h1>⚛ Atom 3D Generator</h1>
  <div class="controls">
    <input id="inp" type="text" placeholder="Element name, symbol, or atomic number…" />
    <button class="btn btn-gen" id="btn-gen">Generate</button>
    <button class="btn btn-dl" id="btn-dl">⬇ Download STL</button>
  </div>
</header>
<div id="wrap">
  <div id="info">
    <h2 id="i-name"></h2>
    <span id="i-badge" class="badge"></span>
    <div id="i-det"></div>
    <button id="btn-dl-panel">⬇ Download STL</button>
  </div>
  <div id="err">Element not found. Try "Carbon", "Fe", or "26".</div>
  <div id="hint">Enter an element above to begin</div>
</div>

<script type="importmap">

</script>

const bySymbol={}, byName={}, byZ={};
RAW.forEach(([s,n,z,m,sh,c])=>{
  const el={symbol:s,name:n,Z:z,mass:m,shells:sh,category:c};
  bySymbol[s.toLowerCase()]=el;
  byName[n.toLowerCase()]=el;
  byZ[z]=el;
});

function findEl(q){
  q=q.trim();
  const n=parseInt(q);
  if(!isNaN(n)&&byZ[n]) return byZ[n];
  return bySymbol[q.toLowerCase()]||byName[q.toLowerCase()]||null;
}

// ── Colors ────────────────────────────────────────────────────────────────────
const COLORS={
  nonmetal:0x4499ff, noble:0xcc44ff, alkali:0xff5533,
  alkaline:0xffaa22, transition:0x44aaff, 'post-transition':0x33ddbb,
  metalloid:0x88ee44, halogen:0x22ffee, lanthanide:0xff88cc, actinide:0xbb88ff,
};
const CAT_LABEL={
  nonmetal:'Reactive Nonmetal', noble:'Noble Gas', alkali:'Alkali Metal',
  alkaline:'Alkaline Earth Metal', transition:'Transition Metal',
  'post-transition':'Post-Transition Metal', metalloid:'Metalloid',
  halogen:'Halogen', lanthanide:'Lanthanide', actinide:'Actinide',
};

// ── Three.js Setup ────────────────────────────────────────────────────────────
const wrap=document.getElementById('wrap');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(wrap.clientWidth,wrap.clientHeight);
wrap.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,wrap.clientWidth/wrap.clientHeight,0.1,600);
camera.position.set(0,0,22);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.06;
controls.minDistance=3; controls.maxDistance=150;

scene.add(new THREE.AmbientLight(0xffffff,0.35));
const dir=new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,7); scene.add(dir);

// Starfield
{
  const N=3000, pos=new Float32Array(N*3);
  for(let i=0;i<N*3;i++) pos[i]=(Math.random()-.5)*400;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:0.25,sizeAttenuation:true})));
}

window.addEventListener('resize',()=>{
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  camera.aspect=wrap.clientWidth/wrap.clientHeight;
  camera.updateProjectionMatrix();
});

// ── Atom State ────────────────────────────────────────────────────────────────
let atomGroup=null, electronOrbits=[], currentEl=null;

// Each shell gets a distinct 3D tilt so the model looks fully 3D
const TILTS=[
  [0,0,0],
  [Math.PI/2,0,0],
  [0,0,Math.PI/2],
  [Math.PI/4,Math.PI/4,0],
  [Math.PI/3,0,Math.PI/3],
  [0,Math.PI/3,Math.PI/3],
  [Math.PI*0.6,Math.PI*0.2,Math.PI*0.4],
];

function buildAtom(el){
  if(atomGroup) scene.remove(atomGroup);
  electronOrbits=[];
  atomGroup=new THREE.Group();
  scene.add(atomGroup);

  const col=COLORS[el.category]||0xffffff;
  const tc=new THREE.Color(col);

  // Nucleus
  const nr=0.5+Math.log(Math.max(el.Z,1))*0.28;
  const nMesh=new THREE.Mesh(
    new THREE.SphereGeometry(nr,40,40),
    new THREE.MeshPhongMaterial({color:tc,emissive:tc,emissiveIntensity:0.65,shininess:130})
  );
  atomGroup.add(nMesh);
  const nLight=new THREE.PointLight(col,2.5,50);
  atomGroup.add(nLight);

  el.shells.forEach((count,idx)=>{
    const shellR=nr+2.6+idx*2.9;
    const tilt=TILTS[idx%TILTS.length];

    const sg=new THREE.Group();
    sg.rotation.set(...tilt);
    atomGroup.add(sg);

    // Ring (torus)
    sg.add(new THREE.Mesh(
      new THREE.TorusGeometry(shellR,0.07,8,100),
      new THREE.MeshPhongMaterial({color:tc,emissive:tc,emissiveIntensity:0.25,transparent:true,opacity:0.55})
    ));

    // Electron orbit group (spins around local Z = normal of ring plane)
    const orbit=new THREE.Group();
    sg.add(orbit);
    electronOrbits.push({orbit, speed:0.009/(idx*0.55+1)});

    for(let e=0;e<count;e++){
      const a=(e/count)*Math.PI*2;
      const em=new THREE.Mesh(
        new THREE.SphereGeometry(0.22,12,12),
        new THREE.MeshPhongMaterial({color:0xffffff,emissive:0xaaccff,emissiveIntensity:0.9,shininess:200})
      );
      em.position.set(shellR*Math.cos(a), shellR*Math.sin(a), 0);
      orbit.add(em);
    }
  });

  // Fit camera
  const maxR=nr+2.6+(el.shells.length-1)*2.9;
  camera.position.set(0,0,maxR*2.6+8);
  controls.target.set(0,0,0);
  controls.update();
}

// ── STL Export ────────────────────────────────────────────────────────────────
function exportSTL(){
  if(!atomGroup||!currentEl) return;
  const geos=[];
  atomGroup.traverse(obj=>{
    if(!obj.isMesh) return;
    const g=obj.geometry.clone();
    obj.updateWorldMatrix(true,false);
    g.applyMatrix4(obj.matrixWorld);
    // ensure consistent attributes: keep only position & normal
    const p=g.attributes.position;
    const n=g.attributes.normal||new THREE.BufferAttribute(new Float32Array(p.count*3),3);
    const clean=new THREE.BufferGeometry();
    clean.setAttribute('position',p);
    clean.setAttribute('normal',n);
    if(g.index) clean.setIndex(g.index);
    geos.push(clean);
  });
  if(!geos.length) return;
  const merged=BufferGeometryUtils.mergeGeometries(geos,false);
  const blob=new Blob([new STLExporter().parse(new THREE.Mesh(merged),{binary:true})],
    {type:'application/octet-stream'});
  const a=Object.assign(document.createElement('a'),
    {href:URL.createObjectURL(blob),download:`${currentEl.symbol}_atom.stl`});
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── UI ────────────────────────────────────────────────────────────────────────
const inp=document.getElementById('inp');
const btnDl=document.getElementById('btn-dl');
const errDiv=document.getElementById('err');
const infoDiv=document.getElementById('info');
const hint=document.getElementById('hint');

function generate(){
  const q=inp.value.trim();
  if(!q) return;
  const el=findEl(q);
  errDiv.style.display='none';
  if(!el){ errDiv.style.display='block'; infoDiv.style.display='none'; btnDl.style.display='none'; return; }
  currentEl=el;
  buildAtom(el);

  const hex='#'+((COLORS[el.category]||0xffffff).toString(16).padStart(6,'0'));
  document.getElementById('i-name').textContent=`${el.symbol}  —  ${el.name}`;
  const badge=document.getElementById('i-badge');
  badge.textContent=CAT_LABEL[el.category]||el.category;
  badge.style.cssText=`background:${hex}22;color:${hex};border:1px solid ${hex}66`;

  const shellLines=el.shells.map((n,i)=>`Shell ${i+1}: ${n} e⁻`).join('<br>');
  document.getElementById('i-det').innerHTML=
    `Atomic #: ${el.Z}<br>Atomic Mass: ${el.mass} u<br>`+
    `Electrons: ${el.Z}<br>Shells: ${el.shells.length}<br><br>${shellLines}`;

  infoDiv.style.display='block';
  btnDl.style.display='';
  document.getElementById('btn-dl-panel').style.display='block';
  hint.textContent='Drag to rotate  •  Scroll to zoom  •  Click Download STL to export';
}

inp.addEventListener('keydown',e=>{ if(e.key==='Enter') generate(); });
document.getElementById('btn-gen').addEventListener('click',generate);
btnDl.addEventListener('click',exportSTL);
document.getElementById('btn-dl-panel').addEventListener('click',exportSTL);

// ── Animation Loop ────────────────────────────────────────────────────────────
(function animate(){
  requestAnimationFrame(animate);
  electronOrbits.forEach(({orbit,speed})=>{ orbit.rotation.z+=speed; });
  controls.update();
  renderer.render(scene,camera);
})();

// Default on load
setTimeout(()=>{ inp.value='Carbon'; generate(); },200);
</script>
</body>
</html>
