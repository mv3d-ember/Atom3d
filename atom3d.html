body{background:#060613;color:#dde;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 20px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:16px;flex-wrap:wrap}

const COLORS={

// ── Atom State ────────────────────────────────────────────────────────────────
let atomGroup=null, electronOrbits=[], currentEl=null;

// Each shell gets a distinct 3D tilt so the model looks fully 3D
const TILTS=[
  [0,0,0],
  [Math.PI/2,0,0],
  [0,0,Math.PI/2],
  [Math.PI/4,Math.PI/4,0],
  [Math.PI/3,0,Math.PI/3],
  [0,Math.PI/3,Math.PI/3],
  [Math.PI*0.6,Math.PI*0.2,Math.PI*0.4],
];

function buildAtom(el){
  if(atomGroup) scene.remove(atomGroup);
  electronOrbits=[];
  atomGroup=new THREE.Group();
  scene.add(atomGroup);

  const col=COLORS[el.category]||0xffffff;
  const tc=new THREE.Color(col);

  // Nucleus
  const nr=0.5+Math.log(Math.max(el.Z,1))*0.28;
  const nMesh=new THREE.Mesh(
    new THREE.SphereGeometry(nr,40,40),
    new THREE.MeshPhongMaterial({color:tc,emissive:tc,emissiveIntensity:0.65,shininess:130})
  );
  atomGroup.add(nMesh);
  const nLight=new THREE.PointLight(col,2.5,50);
  atomGroup.add(nLight);

  el.shells.forEach((count,idx)=>{
    const shellR=nr+2.6+idx*2.9;
    const tilt=TILTS[idx%TILTS.length];

    const sg=new THREE.Group();
    sg.rotation.set(...tilt);
    atomGroup.add(sg);

    // Ring (torus)
    sg.add(new THREE.Mesh(
      new THREE.TorusGeometry(shellR,0.07,8,100),
      new THREE.MeshPhongMaterial({color:tc,emissive:tc,emissiveIntensity:0.25,transparent:true,opacity:0.55})
    ));

    // Electron orbit group (spins around local Z = normal of ring plane)
    const orbit=new THREE.Group();
    sg.add(orbit);
    electronOrbits.push({orbit, speed:0.009/(idx*0.55+1)});

    for(let e=0;e<count;e++){
      const a=(e/count)*Math.PI*2;
      const em=new THREE.Mesh(
        new THREE.SphereGeometry(0.22,12,12),
        new THREE.MeshPhongMaterial({color:0xffffff,emissive:0xaaccff,emissiveIntensity:0.9,shininess:200})
      );
      em.position.set(shellR*Math.cos(a), shellR*Math.sin(a), 0);
      orbit.add(em);
    }
  });

  // Fit camera
  const maxR=nr+2.6+(el.shells.length-1)*2.9;
  camera.position.set(0,0,maxR*2.6+8);
  controls.target.set(0,0,0);
  controls.update();
}

// ── STL Export ────────────────────────────────────────────────────────────────
function exportSTL(){
  if(!atomGroup||!currentEl) return;
  const geos=[];
  atomGroup.traverse(obj=>{
    if(!obj.isMesh) return;
    const g=obj.geometry.clone();
    obj.updateWorldMatrix(true,false);
    g.applyMatrix4(obj.matrixWorld);
    // ensure consistent attributes: keep only position & normal
    const p=g.attributes.position;
    const n=g.attributes.normal||new THREE.BufferAttribute(new Float32Array(p.count*3),3);
    const clean=new THREE.BufferGeometry();
    clean.setAttribute('position',p);
    clean.setAttribute('normal',n);
    if(g.index) clean.setIndex(g.index);
    geos.push(clean);
  });
  if(!geos.length) return;
  const merged=BufferGeometryUtils.mergeGeometries(geos,false);
  const blob=new Blob([new STLExporter().parse(new THREE.Mesh(merged),{binary:true})],
    {type:'application/octet-stream'});
  const a=Object.assign(document.createElement('a'),
    {href:URL.createObjectURL(blob),download:`${currentEl.symbol}_atom.stl`});
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── UI ────────────────────────────────────────────────────────────────────────
const inp=document.getElementById('inp');
const btnDl=document.getElementById('btn-dl');
const errDiv=document.getElementById('err');
const infoDiv=document.getElementById('info');
const hint=document.getElementById('hint');

function generate(){
  const q=inp.value.trim();
  if(!q) return;
  const el=findEl(q);
  errDiv.style.display='none';
  if(!el){ errDiv.style.display='block'; infoDiv.style.display='none'; btnDl.style.display='none'; return; }
  currentEl=el;
  buildAtom(el);

  const hex='#'+((COLORS[el.category]||0xffffff).toString(16).padStart(6,'0'));
  document.getElementById('i-name').textContent=`${el.symbol}  —  ${el.name}`;
  const badge=document.getElementById('i-badge');
  badge.textContent=CAT_LABEL[el.category]||el.category;
  badge.style.cssText=`background:${hex}22;color:${hex};border:1px solid ${hex}66`;

  const neutrons=Math.round(el.mass)-el.Z;
  const shellLines=el.shells.map((n,i)=>`Shell ${i+1}: ${n} e⁻`).join('<br>');
  const facts=FACTS[el.symbol]||[];
  const fact=facts[Math.floor(Math.random()*facts.length)]||'';
  document.getElementById('i-det').innerHTML=
    `Atomic #: ${el.Z}<br>Protons: ${el.Z}<br>Neutrons: ~${neutrons}<br>`+
    `Atomic Mass: ${el.mass} u<br>Electrons: ${el.Z}<br>Shells: ${el.shells.length}`+
    `<br><br>${shellLines}`+
    (fact?`<hr style="border-color:rgba(255,255,255,.12);margin:10px 0"><span style="opacity:.7;font-style:italic">💡 ${fact}</span>`:'');

  infoDiv.style.display='block';
  btnDl.style.display='';
  document.getElementById('btn-dl-panel').style.display='block';
  hint.textContent='Drag to rotate  •  Scroll to zoom  •  Click Download STL to export';
}

inp.addEventListener('keydown',e=>{ if(e.key==='Enter') generate(); });
document.getElementById('btn-gen').addEventListener('click',generate);
btnDl.addEventListener('click',exportSTL);
document.getElementById('btn-dl-panel').addEventListener('click',exportSTL);

function findCompound(inputs){
  const syms=[...new Set(inputs.filter(Boolean).map(v=>findEl(v)).filter(Boolean).map(e=>e.symbol))];
  if(syms.length<2) return null;
  return COMPOUNDS[syms.sort().join('+')]||null;
}

// ── Bond Cylinder Helpers ─────────────────────────────────────────────────────
function makeCyl(pA,pB,r,col){
  const dir=new THREE.Vector3().subVectors(pB,pA);
  const len=dir.length();
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,8),new THREE.MeshPhongMaterial({color:col,shininess:60}));
  m.position.addVectors(pA,pB).multiplyScalar(.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
  return m;
}
function addBond3D(grp,pA,pB,order){
  const col=0xcccccc;
  if(order>=2){
    const d=new THREE.Vector3().subVectors(pB,pA).normalize();
    const arb=Math.abs(d.y)<.9?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
    const pp=new THREE.Vector3().crossVectors(d,arb).normalize().multiplyScalar(.22);
    if(order===3) grp.add(makeCyl(pA.clone(),pB.clone(),.09,col));
    grp.add(makeCyl(pA.clone().add(pp),pB.clone().add(pp),.09,col));
    grp.add(makeCyl(pA.clone().sub(pp),pB.clone().sub(pp),.09,col));
  } else {
    grp.add(makeCyl(pA.clone(),pB.clone(),.13,col));
  }
}

// ── Build Molecule ────────────────────────────────────────────────────────────
let molGroup=null;
function buildMolecule(compound){
  if(atomGroup){scene.remove(atomGroup);atomGroup=null;electronOrbits=[];}
  if(molGroup) scene.remove(molGroup);
  molGroup=new THREE.Group();
  scene.add(molGroup);
  const pos=compound.atoms.map(a=>new THREE.Vector3(...a.p));
  compound.bonds.forEach(b=>addBond3D(molGroup,pos[b.a],pos[b.b],b.o));
  compound.atoms.forEach((a,i)=>{
    const col=CPK_COLOR[a.el]||'#888';
    const sz=CPK_SIZE[a.el]||.75;
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(sz,22,22),
      new THREE.MeshPhongMaterial({color:new THREE.Color(col),emissive:new THREE.Color(col),emissiveIntensity:.18,shininess:90})
    );
    mesh.position.copy(pos[i]);
    molGroup.add(mesh);
  });
  const bbox=new THREE.Box3().setFromObject(molGroup);
  const sz=bbox.getSize(new THREE.Vector3()).length();
  camera.position.set(0,0,sz*1.8+6);
  controls.target.set(0,0,0);
  controls.update();
}

function updateBondInfo(c){
  document.getElementById('b-name').textContent=c.name;
  const badge=document.getElementById('b-badge');
  badge.textContent=c.bondType;
  const bc=c.bondType.includes('Ionic')?'#ff8844':c.bondType.includes('Polar')?'#44aaff':'#44ff88';
  badge.style.cssText=`background:${bc}22;color:${bc};border:1px solid ${bc}66`;
  const uEls=[...new Set(c.atoms.map(a=>a.el))];
  const legend=uEls.map(el=>{const cl=CPK_COLOR[el]||'#888';return`<span style="display:inline-flex;align-items:center;gap:5px;margin-right:10px"><span style="width:11px;height:11px;border-radius:50%;background:${cl};border:1px solid rgba(255,255,255,.35);display:inline-block"></span>${el}</span>`;}).join('');
  document.getElementById('b-det').innerHTML=
    `Formula: <strong>${c.formula}</strong><br>`+
    `Shape: ${c.shape}<br>`+
    `Bond Angle: ${c.angle}<br><br>`+
    `<div style="margin-bottom:6px">${legend}</div>`+
    `<hr style="border-color:rgba(255,255,255,.12);margin:8px 0">`+
    `<span style="opacity:.72;font-size:.78rem;font-style:italic">${c.desc}</span>`;
  document.getElementById('bond-info').style.display='block';
}

// ── Bond Mode Logic ───────────────────────────────────────────────────────────
const bondErr=document.getElementById('bond-err');
function combineBond(){
  const v1=document.getElementById('el1').value.trim();
  const v2=document.getElementById('el2').value.trim();
  const v3=document.getElementById('el3').value.trim();
  bondErr.style.display='none';
  document.getElementById('bond-info').style.display='none';
  if(!v1||!v2){bondErr.innerHTML='Please enter at least 2 elements.';bondErr.style.display='block';return;}
  const compound=findCompound([v1,v2,v3]);
  if(!compound){
    const syms=[v1,v2,v3].filter(Boolean).map(v=>{const e=findEl(v);return e?e.symbol:v.toUpperCase();});
    bondErr.innerHTML=`No known compound found for <b>${syms.join(' + ')}</b>.<br><small style="opacity:.7">Try: H+O, C+O, Na+Cl, H+N+O, H+O+S…</small>`;
    bondErr.style.display='block';
    return;
  }
  buildMolecule(compound);
  updateBondInfo(compound);
  document.getElementById('hint').textContent='Drag to rotate  •  Scroll to zoom';
}
['el1','el2','el3'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')combineBond();});
});
document.getElementById('btn-combine').addEventListener('click',combineBond);

// ── Mode Switch ───────────────────────────────────────────────────────────────
let appMode='atom';
document.getElementById('btn-toggle').addEventListener('click',()=>{
  appMode=appMode==='atom'?'bond':'atom';
  const isAtom=appMode==='atom';
  document.getElementById('atom-controls').style.display=isAtom?'flex':'none';
  document.getElementById('bond-controls').style.display=isAtom?'none':'flex';
  document.getElementById('info').style.display='none';
  document.getElementById('bond-info').style.display='none';
  document.getElementById('btn-dl').style.display='none';
  document.getElementById('btn-dl-panel').style.display='none';
  document.getElementById('err').style.display='none';
  bondErr.style.display='none';
  document.getElementById('app-title').textContent=isAtom?'⚛ Atom 3D Generator':'🔗 Bond Builder';
  document.getElementById('btn-toggle').textContent=isAtom?'🔗 Bond Builder':'⚛ Atom Viewer';
  document.getElementById('hint').textContent=isAtom?'Enter an element above to begin':'Enter 2–3 elements to see how they bond';
  if(atomGroup){scene.remove(atomGroup);atomGroup=null;electronOrbits=[];}
  if(molGroup){scene.remove(molGroup);molGroup=null;}
  camera.position.set(0,0,22);controls.target.set(0,0,0);controls.update();
});

// ── Animation Loop ────────────────────────────────────────────────────────────
(function animate(){
  requestAnimationFrame(animate);
  electronOrbits.forEach(({orbit,speed})=>{ orbit.rotation.z+=speed; });
  if(molGroup) molGroup.rotation.y+=.003;
  controls.update();
  renderer.render(scene,camera);
})();

// Default on load
setTimeout(()=>{ inp.value='Carbon'; generate(); },200);
</script>
